---
# VMware vSphere Connection Parameters
# These variables will be used by AAP credentials for secure connection

# vSphere connection settings
vcenter_hostname: "{{ vcenter_server | default('vcenter.example.com') }}"
vcenter_username: "{{ vcenter_user | default(ansible_user) }}"
vcenter_password: "{{ vcenter_pass | default(ansible_password) }}"
vcenter_validate_certs: "{{ validate_ssl_certs | default(false) }}"
vcenter_port: "{{ vcenter_port_number | default(443) }}"

# Collection preferences - use certified collections first
use_certified_collections: true
vmware_collection_namespace: "vmware.vmware_rest"
# Note: This playbook is designed specifically for the vmware.vmware_rest certified collection

# VM filtering and search parameters
vm_search_filters:
  # Filter VMs by power state (optional)
  power_states: 
    - "poweredOn"
    - "poweredOff"
    - "suspended"
  
  # Include VMs with specific patterns (optional)
  name_patterns: []
  
  # Exclude template VMs
  exclude_templates: true

# CD-ROM device reporting configuration
cdrom_report_config:
  # Output format options: json, yaml, table
  output_format: "table"
  
  # Include detailed device information
  include_device_details: true
  
  # Report file location (relative to playbook directory)
  report_file: "../reports/vmware_cdrom_report_{{ ansible_date_time.epoch }}.txt"
  
  # Create timestamped reports
  timestamp_reports: true

# CD-ROM removal configuration
cdrom_removal_config:
  # Safety controls
  dry_run: true  # Set to false to perform actual removal
  confirm_removal: true  # Require user confirmation for live removal
  
  # Display options
  show_details: true  # Show detailed ISO information before removal
  
  # Reporting
  generate_report: true
  output_format: "table"  # Options: json, table
  report_file: "../reports/vmware_cdrom_removal_report_{{ ansible_date_time.epoch }}.txt"
  
  # VM filtering for removal (inherits from vm_search_filters)
  # Additional safety filters can be added here
  skip_powered_on_vms: false  # Set to true to skip VMs that are powered on

# Logging and debugging
debug_mode: false
log_vmware_api_calls: false

# Performance tuning
max_concurrent_tasks: 10
api_timeout: 60
